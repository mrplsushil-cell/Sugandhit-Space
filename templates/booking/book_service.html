{% extends "base.html" %}
{% block title %}Book Service - Sugandhit Space{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 class="mb-4">{{ service.name }}</h2>
            <div class="card">
                <div class="card-body">
                    <p class="card-text mb-3">{{ service.description }}</p>
                    <p class="h5 text-success mb-4">Price: {{ '%0.2f'|format(service.price)|currency }}</p>
                    
                    <form method="POST">
                        <div class="mb-3">
                            <label for="booking_date" class="form-label">Select Date</label>
                            <input type="date" class="form-control" id="booking_date" name="booking_date" min="{{ min_date }}" max="{{ max_date }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="time" class="form-label">Select Time</label>
                            <select class="form-control" id="time" name="time" required>
                                <option value="">Choose time slot</option>
                                <option value="09:00">09:00 AM</option>
                                <option value="10:00">10:00 AM</option>
                                <option value="11:00">11:00 AM</option>
                                <option value="14:00">2:00 PM</option>
                                <option value="15:00">3:00 PM</option>
                                <option value="16:00">4:00 PM</option>
                                <option value="17:00">5:00 PM</option>
                                <option value="18:00">6:00 PM</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="notes" class="form-label">Additional Notes (Optional)</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3" placeholder="Tell us any specific requirements..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="fas fa-check"></i> Confirm Booking
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
