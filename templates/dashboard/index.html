{% extends "base.html" %}
{% block title %}My Dashboard - Sugandhit Space{% endblock %}
{% block content %}
<div class="container py-5">
    <h2 class="mb-4"><i class="fas fa-user-circle"></i> My Dashboard</h2>
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-muted">Total Orders</h5>
                    <h3 class="text-primary">{{ total_orders }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card text-center">
                <div class="card-body">
                    <h5 class="text-muted">Total Bookings</h5>
                    <h3 class="text-primary">{{ total_bookings }}</h3>
                </div>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-body">
                    <h5>Quick Links</h5>
                    <a href="{{ url_for('dashboard.my_orders') }}" class="btn btn-outline-primary btn-sm me-2"><i class="fas fa-shopping-bag"></i> My Orders</a>
                    <a href="{{ url_for('dashboard.my_bookings') }}" class="btn btn-outline-primary btn-sm"><i class="fas fa-calendar"></i> My Bookings</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
