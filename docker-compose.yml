version: '3.8'

services:
  web:
    build: .
    container_name: sugandhit-app
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    volumes:
      - ./sugandhit.db:/app/sugandhit.db
    networks:
      - sugandhit-network

  nginx:
    image: nginx:latest
    container_name: sugandhit-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - sugandhit-network

networks:
  sugandhit-network:
    driver: bridge
